services:
  serphouse-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: serphouse-mcp:latest
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      SERPHOUSE_API_KEY: ${SERPHOUSE_API_KEY}
      SERPHOUSE_API_TOKEN: ${SERPHOUSE_API_TOKEN:-}
      SERPHOUSE_BASE_URL: ${SERPHOUSE_BASE_URL:-}
      SERPHOUSE_TIMEOUT_MS: ${SERPHOUSE_TIMEOUT_MS:-}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
